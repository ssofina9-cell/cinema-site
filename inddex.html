<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaWave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">CinemaWave</div>

        <div class="burger" id="burger">☰</div>

        <nav class="nav" id="nav">
            <a href="#">Головна</a>
            <a href="#">Про нас</a>
            <a href="#">Розклад</a>
            <a href="#">Контакти</a>
        </nav>

        <a href="tel:+380441234567" class="phone">+380 44 123 4567</a>
    </div>
</header>

<section class="hero container">
    <h1>Ласкаво просимо до <span>CinemaWave</span></h1>

    <p>
        Зануртесь у світ кіно з найсучаснішими технологіями,
        комфортними кріслами та неймовірною якістю звуку
    </p>

    <div class="buttons">
        <button class="btn-outline">Дізнатись більше</button>
        <button class="btn-main">Переглянути розклад</button>
    </div>
</section>

<section class="features container">

    <div class="card tall">
        <img src="https://images.unsplash.com/photo-1585647347483-22b66260dfff">
        <div class="card-text">
            <h3>Комфортні крісла</h3>
            <p>IMAX та Dolby Atmos система</p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1585238342028-966c53c5f7f3">
    </div>

    <div class="card wide">
        <img src="https://images.unsplash.com/photo-1604975701397-6365ccbd028a">
    </div>

    <div class="card tall">
        <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4">
        <div class="card-text">
            <h3>VIP зали</h3>
            <p>Преміум перегляд з сервісом</p>
        </div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
